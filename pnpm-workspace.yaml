packages:
  - 'packages/*'
  - '!**/node_modules/**'
# pnpm 11+ — allow dependency install/build scripts (see ui-builder pnpm-workspace.yaml)
allowBuilds:
  '@openzeppelin/adapter-stellar': true
  bigint-buffer: true
  blake-hash: true
  bufferutil: true
  classic-level: true
  esbuild: true
  keccak: true
  protobufjs: true
  secp256k1: true
  tiny-secp256k1: true
  unrs-resolver: true
  usb: true
  utf-8-validate: true
