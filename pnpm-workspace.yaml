packages:
  - 'packages/*'
  - '!**/node_modules/**'
overrides:
  use-sync-external-store: ^1.2.0
  valtio: ^1.13.2
  '@paulmillr/qr': 'npm:qr@^0.5.0'
  '@walletconnect/modal': '2.7.0'
  '@types/react': ^19.1.8
  react-hook-form: 7.80.0
  '@wagmi/core': ^2.20.3
  glob: ^11.1.0
  zod: ^3.25.76
  viem: 2.44.4
  '@midnight-ntwrk/midnight-js-contracts': 2.0.2
  '@midnight-ntwrk/midnight-js-http-client-proof-provider': 2.0.2
  '@midnight-ntwrk/midnight-js-indexer-public-data-provider': 2.0.2
  '@midnight-ntwrk/midnight-js-network-id': 2.0.2
  '@midnight-ntwrk/midnight-js-types': 2.0.2
  '@midnight-ntwrk/midnight-js-utils': 2.0.2
  'protobufjs@<7.6.3': ^7.6.3
  '@protobufjs/utf8@<1.1.1': ^1.1.1
  'hono@<4.12.25': ^4.12.25
  'ws@>=8.0.0 <8.21.0': ^8.21.0
  'ws@>=7.0.0 <7.5.11': ^7.5.11
  'vite@>=7.0.0 <7.3.5': ^7.3.5
  'lodash@<4.18.0': ^4.18.0
  'tmp@<0.2.6': ^0.2.6
  'form-data@>=4.0.0 <4.0.6': ^4.0.6
  'ua-parser-js@>=2.0.1 <2.0.10': ^2.0.10
  'js-yaml@>=4.0.0 <4.2.0': ^4.2.0
  'uuid@<11.1.1': ^11.1.1
  '@babel/core@<7.29.6': ^7.29.6
  '@metamask/sdk@<0.33.1': ^0.33.1
  '@metamask/sdk-communication-layer@<0.33.1': ^0.33.1
  'ip-address@<=10.1.0': ^10.1.1
# pnpm 11+ — allow dependency install/build scripts (see ui-builder pnpm-workspace.yaml)
allowBuilds:
  '@openzeppelin/adapter-stellar': true
  bigint-buffer: true
  blake-hash: true
  bufferutil: true
  classic-level: true
  esbuild: true
  keccak: true
  protobufjs: true
  secp256k1: true
  tiny-secp256k1: true
  unrs-resolver: true
  usb: true
  utf-8-validate: true
