---
name: Pre-requisites
description: |
  Setup Pre-requisites

inputs:
  token:
    description: GitHub token for checkout and authentication
    required: true
  node-version:
    description: Node.js version for setup-node
    required: false
    default: "24.x"
  package-manager-cache:
    description: Enable setup-node dependency caching (disable for release builds)
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        token: ${{ inputs.token }}
        persist-credentials: true

    - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      with:
        run_install: false

    - name: Use Node.js ${{ inputs.node-version }}
      if: ${{ inputs.package-manager-cache == 'true' }}
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Use Node.js ${{ inputs.node-version }} (no dependency cache)
      if: ${{ inputs.package-manager-cache != 'true' }}
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: ${{ inputs.package-manager-cache }}

    - name: Install dependencies
      run: |
        pnpm install-deps
      shell: bash
